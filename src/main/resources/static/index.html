<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>egSys - Minhas Tarefas</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loader"
        class="d-none justify-content-center align-items-center position-fixed w-100 h-100 top-0 start-0 z-3"
        style="background: rgba(0,0,0,0.7);">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>

    <!-- Tela de Login -->
    <div id="login-view" class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">egSys</h2>
                <p class="text-muted">Acesse para gerenciar suas tarefas</p>
            </div>

            <div id="login-error" class="alert alert-danger d-none py-2" role="alert"></div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuário</label>
                    <input type="text" id="username" class="form-control" required value="admin">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" id="password" class="form-control" required value="admin">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Entrar na Plataforma</button>
            </form>
        </div>
    </div>

    <!-- Tela de Tarefas (Dashboard) -->
    <div id="dashboard-view" class="container py-5 d-none">

        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold text-primary m-0">Minhas Tarefas</h1>
            <button id="btn-logout" class="btn btn-outline-danger btn-sm px-4 fw-semibold">Sair</button>
        </div>

        <div class="row g-4">
            <!-- Coluna: Formulário de Nova Tarefa -->
            <div class="col-lg-4">
                <div class="card p-4 shadow-sm sticky-top" style="top: 2rem;">
                    <h5 class="fw-bold mb-4">Nova Tarefa</h5>
                    <form id="task-form">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Título</label>
                            <input type="text" id="task-title" class="form-control"
                                placeholder="O que precisa ser feito?" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Descrição (Opcional)</label>
                            <textarea id="task-desc" class="form-control" rows="3"
                                placeholder="Detalhes da tarefa..."></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-semibold">Categoria</label>
                            <select id="task-category" class="form-select" required>
                                <option value="" disabled selected>Carregando categorias...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 shadow-sm py-2 fw-bold">Criar Tarefa</button>
                    </form>
                </div>
            </div>

            <!-- Coluna: Lista de Tarefas -->
            <div class="col-lg-8">
                <div id="tasks-container" class="d-flex flex-column gap-3">
                    <!-- Tarefas serão injetadas via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="/app.js"></script>
</body>

</html>
